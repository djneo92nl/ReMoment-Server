---
# Deploy or update the ReMoment application. Safe to re-run.
# Usage: ansible-playbook -i ansible/inventory.yml ansible/deploy.yml --ask-vault-pass
#
# First deploy: also run setup.yml first.
# Secrets: ansible-vault encrypt ansible/group_vars/vault.yml

- name: Deploy ReMoment application
  hosts: remoment_server
  become: false
  vars_files:
      - group_vars/vault.yml

  tasks:
      - name: Clone or update repository
        ansible.builtin.git:
            repo: "{{ app_repo }}"
            dest: "{{ app_dir }}"
            version: "{{ app_branch }}"
            force: false

      - name: Ensure SQLite database file exists
        ansible.builtin.file:
            path: "{{ app_dir }}/database/database.sqlite"
            state: touch
            mode: '0664'
            modification_time: preserve
            access_time: preserve

      - name: Ensure storage directories exist
        ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: '0775'
        loop:
            - "{{ app_dir }}/storage/app/public"
            - "{{ app_dir }}/storage/framework/cache/data"
            - "{{ app_dir }}/storage/framework/sessions"
            - "{{ app_dir }}/storage/framework/views"
            - "{{ app_dir }}/storage/logs"

      - name: Deploy .env file
        ansible.builtin.template:
            src: templates/env.j2
            dest: "{{ app_dir }}/.env"
            mode: '0640'

      - name: Build Docker image
        ansible.builtin.command:
            cmd: docker compose -f docker-compose.prod.yml build --pull
            chdir: "{{ app_dir }}"
        changed_when: true

      - name: Start services
        ansible.builtin.command:
            cmd: docker compose -f docker-compose.prod.yml up -d
            chdir: "{{ app_dir }}"
        changed_when: true

      - name: Wait for app container to be ready
        ansible.builtin.pause:
            seconds: 5

      - name: Install Composer dependencies
        ansible.builtin.command:
            cmd: >
                docker compose -f docker-compose.prod.yml exec -T -u sail app
                composer install --no-dev --optimize-autoloader
            chdir: "{{ app_dir }}"
        changed_when: true

      - name: Build frontend assets
        ansible.builtin.command:
            cmd: >
                docker compose -f docker-compose.prod.yml exec -T -u sail app
                npm run build
            chdir: "{{ app_dir }}"
        changed_when: true

      - name: Run database migrations
        ansible.builtin.command:
            cmd: >
                docker compose -f docker-compose.prod.yml exec -T -u sail app
                php artisan migrate --force
            chdir: "{{ app_dir }}"
        changed_when: true

      - name: Optimize Laravel application
        ansible.builtin.command:
            cmd: >
                docker compose -f docker-compose.prod.yml exec -T -u sail app
                php artisan optimize
            chdir: "{{ app_dir }}"
        changed_when: true

      - name: Restart app container to apply changes
        ansible.builtin.command:
            cmd: docker compose -f docker-compose.prod.yml restart app
            chdir: "{{ app_dir }}"
        changed_when: true
